<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACM Fellows Citation Map</title>
  <link rel="icon" href="assets/fav.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <script src="vendor-plotly.min.js"></script>
  <script src="data/umap-data.js"></script>
  <script src="data/tsne-data.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Issue #2</p>
      <h1>ACM Fellows Citation Map</h1>
    </div>
    <div class="header-meta">
      <span id="record-count">0 fellows</span>
      <a href="https://github.com/lintool/cs-big-cows" target="_blank" rel="noreferrer">Data source</a>
    </div>
  </header>

  <main class="app-shell">
    <aside class="controls" aria-label="Visualization controls">
      <section class="control-section">
        <label class="control-label" for="projection">Projection</label>
        <div class="segmented" id="projection" role="tablist" aria-label="Projection">
          <button type="button" class="active" data-projection="umap">UMAP</button>
          <button type="button" data-projection="tsne">t-SNE</button>
        </div>
      </section>

      <section class="control-section">
        <label class="control-label" for="search">Search</label>
        <input id="search" type="search" placeholder="Name, citation, keyword">
      </section>

      <section class="control-section">
        <div class="section-row">
          <span class="control-label">Clusters</span>
          <span class="button-group">
            <button type="button" class="text-button" id="show-clusters">[show all]</button>
            <button type="button" class="text-button" id="hide-clusters">[hide all]</button>
          </span>
        </div>
        <div class="cluster-list" id="cluster-list"></div>
      </section>
    </aside>

    <div class="resize-handle resize-handle-left" data-resize-panel="left" role="separator" aria-orientation="vertical" aria-label="Resize controls panel"></div>

    <section class="plot-region" aria-label="Citation visualization">
      <div id="plot"></div>
      <div class="hover-card" id="hover-card" hidden>
        <img id="hover-image" alt="" hidden>
        <div>
          <div class="hover-name" id="hover-name"></div>
          <div class="hover-cluster" id="hover-cluster"></div>
          <div class="hover-citation" id="hover-citation"></div>
        </div>
      </div>
    </section>

    <div class="resize-handle resize-handle-right" data-resize-panel="right" role="separator" aria-orientation="vertical" aria-label="Resize details panel"></div>

    <aside class="details" aria-live="polite">
      <div class="empty-state" id="empty-state">
        <h2>Select a point</h2>
        <p>Click a fellow to inspect the citation, cluster keywords, and profile links.</p>
      </div>

      <article class="profile" id="profile" hidden>
        <div class="profile-media" id="profile-media" hidden>
          <img id="profile-image" alt="">
        </div>
        <h2 id="profile-name"></h2>
        <p id="profile-citation"></p>
        <dl>
          <dt>Cluster</dt>
          <dd id="profile-cluster"></dd>
          <dt>Keywords</dt>
          <dd id="profile-keywords"></dd>
        </dl>
        <div class="profile-links" id="profile-links"></div>
      </article>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
